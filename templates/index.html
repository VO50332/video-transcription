<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Transcriber & Slide Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f1a;
      --card:    #1a1a2e;
      --accent:  #e94f37;
      --accent2: #f5a623;
      --text:    #e0e0e0;
      --muted:   #888;
      --border:  #2e2e4a;
      --success: #27ae60;
      --radius:  12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }

    header p { color: var(--muted); font-size: 1rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 760px;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    input[type="url"], input[type="text"], textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.7rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 90px; font-family: monospace; font-size: 0.85rem; }

    .field { margin-bottom: 1.2rem; }

    details summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      user-select: none;
      margin-bottom: 0.8rem;
    }

    details[open] summary { color: var(--accent2); }

    .row { display: flex; gap: 1rem; }
    .row .field { flex: 1; }

    button {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(90deg, var(--accent), #c0392b);
      color: #fff;
    }

    .btn-dl {
      background: var(--success);
      color: #fff;
      margin-top: 0.6rem;
    }

    /* Progress */
    #status-box { display: none; }

    .progress-bar-wrap {
      background: var(--bg);
      border-radius: 999px;
      height: 8px;
      margin: 1rem 0 0.5rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.4s ease;
      animation: pulse-bar 1.5s ease-in-out infinite;
    }

    @keyframes pulse-bar {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .progress-bar.done { animation: none; width: 100% !important; background: var(--success); }

    #progress-text { font-size: 0.9rem; color: var(--muted); min-height: 1.2em; }

    /* Results */
    #results-box { display: none; }

    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }

    .tab {
      padding: 0.45rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      width: auto;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    #transcript-text, #summary-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.88rem;
      line-height: 1.7;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
      color: var(--text);
    }

    .downloads { display: flex; gap: 1rem; flex-wrap: wrap; }
    .downloads button { flex: 1; min-width: 160px; }

    .error-msg {
      background: rgba(231,76,60,0.12);
      border: 1px solid #e74c3c;
      border-radius: 8px;
      padding: 1rem;
      color: #e74c3c;
      font-size: 0.9rem;
      display: none;
    }

    footer {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Video Transcriber &amp; Slide Generator</h1>
  <p>Paste a video URL → get a transcript, summary, and PowerPoint presentation</p>
</header>

<!-- Input card -->
<div class="card">
  <div class="field">
    <label for="url">Video URL</label>
    <input type="url" id="url" placeholder="https://example.com/video/..." autocomplete="off" />
  </div>

  <details>
    <summary>&#9881; Advanced options</summary>

    <div class="row">
      <div class="field">
        <label for="model">Whisper model</label>
        <select id="model">
          <option value="tiny">tiny – fastest, less accurate</option>
          <option value="base" selected>base – good balance (recommended)</option>
          <option value="small">small – more accurate</option>
          <option value="medium">medium – high accuracy, slow</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="cookies">Cookies (Netscape format, for private/authenticated videos)</label>
      <textarea id="cookies" placeholder="# Netscape HTTP Cookie File&#10;.example.com TRUE / FALSE 0 sessionid abc123..."></textarea>
    </div>
  </details>

  <div class="error-msg" id="error-msg"></div>

  <button class="btn-primary" id="start-btn" onclick="startJob()">&#9654; Transcribe &amp; Generate Slides</button>
</div>

<!-- Progress card -->
<div class="card" id="status-box">
  <label>Progress</label>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div id="progress-text">Starting…</div>
</div>

<!-- Results card -->
<div class="card" id="results-box">
  <div class="downloads" style="margin-bottom:1.2rem">
    <button class="btn-dl" onclick="downloadFile('pptx')">&#8595; Download PowerPoint (.pptx)</button>
    <button class="btn-dl" onclick="downloadFile('txt')" style="background:#2980b9">&#8595; Download Transcript + Summary (.txt)</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('summary')">Summary</button>
    <button class="tab" onclick="switchTab('transcript')">Full Transcript</button>
  </div>

  <div class="tab-content active" id="tab-summary">
    <div id="summary-text"></div>
  </div>
  <div class="tab-content" id="tab-transcript">
    <div id="transcript-text"></div>
  </div>
</div>

<footer>Powered by yt-dlp · OpenAI Whisper · Claude AI · python-pptx</footer>

<script>
let currentJobId = null;
let pollInterval = null;
let progressStep = 0;

const STEPS = [10, 30, 60, 85, 95]; // fake visual progress stages

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

async function startJob() {
  hideError();
  const url = document.getElementById('url').value.trim();
  if (!url) { showError('Please enter a video URL.'); return; }

  const cookies = document.getElementById('cookies').value.trim();
  const model = document.getElementById('model').value;

  document.getElementById('start-btn').disabled = true;
  document.getElementById('results-box').style.display = 'none';
  document.getElementById('status-box').style.display = 'block';
  progressStep = 0;
  setProgress(5, 'Submitting…');

  try {
    const res = await fetch('/transcribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, cookies, model }),
    });
    const data = await res.json();
    if (data.error) { throw new Error(data.error); }
    currentJobId = data.job_id;
    pollInterval = setInterval(pollStatus, 2500);
  } catch (e) {
    showError('Failed to start: ' + e.message);
    resetUI();
  }
}

function setProgress(pct, text) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = text;
}

async function pollStatus() {
  if (!currentJobId) return;
  try {
    const res = await fetch('/status/' + currentJobId);
    const data = await res.json();

    // Advance visual progress
    progressStep = Math.min(progressStep + 1, STEPS.length - 1);
    const pct = data.status === 'done' ? 100 : STEPS[progressStep];
    setProgress(pct, data.progress || '…');

    if (data.status === 'done') {
      clearInterval(pollInterval);
      document.getElementById('progress-bar').classList.add('done');
      await loadResults();
    } else if (data.status === 'error') {
      clearInterval(pollInterval);
      showError('Error: ' + (data.error || 'Unknown error'));
      resetUI();
    }
  } catch (e) {
    // network hiccup, keep polling
  }
}

async function loadResults() {
  const res = await fetch('/result/' + currentJobId);
  const data = await res.json();

  document.getElementById('summary-text').textContent = data.summary || '';
  document.getElementById('transcript-text').textContent = data.transcript || '';
  document.getElementById('results-box').style.display = 'block';
  document.getElementById('start-btn').disabled = false;
}

function downloadFile(type) {
  if (!currentJobId) return;
  window.location.href = '/download/' + type + '/' + currentJobId;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

function resetUI() {
  clearInterval(pollInterval);
  document.getElementById('start-btn').disabled = false;
  document.getElementById('status-box').style.display = 'none';
  progressStep = 0;
}
</script>
</body>
</html>
